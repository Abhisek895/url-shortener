services:
  - type: web
    name: url-shortener-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false   # Set this in Render dashboard
      - key: DB_PORT
        sync: false   # Set this in Render dashboard
      - key: DB_USER
        sync: false   # Set this in Render dashboard
      - key: DB_PASSWORD
        sync: false   # Set this in Render dashboard
      - key: DB_NAME
        sync: false   # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this in Render dashboard
