services:
  # Backend API (Docker)
  - type: web
    name: url-shortener-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false   # Set this in Render dashboard
      - key: DB_PORT
        sync: false   # Set this in Render dashboard
      - key: DB_USER
        sync: false   # Set this in Render dashboard
      - key: DB_PASSWORD
        sync: false   # Set this in Render dashboard
      - key: DB_NAME
        sync: false   # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your frontend Render URL once deployed (e.g. https://url-shortener-frontend.onrender.com)

  # Frontend (Docker + Nginx)
  - type: web
    name: url-shortener-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    dockerBuildArgs:
      - VITE_API_URL=https://url-shortener-0h1c.onrender.com
    envVars:
      - key: VITE_API_URL
        value: https://url-shortener-0h1c.onrender.com
