version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mydb
      MYSQL_USER: abhisek
      MYSQL_PASSWORD: password123

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: backend-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: abhisek
      DB_PASSWORD: password123
      DB_NAME: mydb
      JWT_SECRET: supersecretjwtkey_please_change_in_production
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: frontend-app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: